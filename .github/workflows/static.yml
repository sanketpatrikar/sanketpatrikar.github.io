name: deploy tanstack start site to github pages

on:
    push:
        branches: ["main"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest

        steps:
            - name: checkout
              uses: actions/checkout@v6

            - run: corepack enable

            - name: setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 25.x
                  cache: pnpm

            - name: install dependencies
              run: pnpm install --frozen-lockfile

            - name: build
              run: pnpm run build

            - name: setup pages
              uses: actions/configure-pages@v6

            - name: upload pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: ./dist/client

            - name: deploy to github pages
              id: deployment
              uses: actions/deploy-pages@v5
